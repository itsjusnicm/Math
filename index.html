<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P3 Long Division (Column Method)</title>
<style>
body { font-family: Arial; text-align: center; background:#f7fbff; }
.container { margin-top: 30px; }

.division {
    display: inline-block;
    text-align: left;
    font-size: 26px;
    line-height: 40px;
}

.row { display: flex; align-items: center; }

.box {
    width: 40px;
    height: 40px;
    text-align: center;
    font-size: 20px;
    margin: 2px;
}

.hidden { visibility: hidden; }

button { margin-top: 15px; padding: 8px 15px; }

.feedback { margin-top: 10px; font-size: 18px; }
</style>
</head>

<body>
<div class="container">

<h2>Long Division (Show Your Working)</h2>
<div id="question"></div>

<div class="division">

    <!-- Quotient row -->
    <div class="row">
        <span> </span>
        <input class="box" id="q1">
        <input class="box" id="q2">
        <input class="box" id="q3">
    </div>

    <!-- Main division line -->
    <div class="row">
        <span id="divisor"></span> ⟌ 
        <span id="dividend"></span>
    </div>

    <!-- Step 1 -->
    <div class="row">
        <span> </span>
        <input class="box" id="m1a">
        <input class="box" id="m1b">
    </div>

    <div class="row">
        <span> </span>
        <span>— — —</span>
    </div>

    <div class="row">
        <span> </span>
        <input class="box" id="s1a">
        <input class="box" id="s1b">
    </div>

</div>

<br>
Remainder: <input id="r">

<br>
<button onclick="check()">Submit</button>

<div class="feedback" id="fb"></div>
<div id="progress"></div>

</div>

<script>
let divisor, dividend, quotient, remainder;

function gen(){
    divisor = Math.floor(Math.random()*8)+2;
    quotient = Math.floor(Math.random()*90)+10;
    dividend = divisor * quotient;
    remainder = 0;

    document.getElementById("divisor").innerText = divisor;
    document.getElementById("dividend").innerText = dividend;

    document.getElementById("question").innerText =
        "Solve using long division:";

    document.querySelectorAll("input").forEach(i=>i.value="");
}

function check(){
    let qInput =
        document.getElementById("q1").value +
        document.getElementById("q2").value +
        document.getElementById("q3").value;

    let rInput = parseInt(document.getElementById("r").value);

    if(parseInt(qInput) === quotient && rInput === remainder){
        document.getElementById("fb").innerText = "✅ Correct!";
    } else {
        document.getElementById("fb").innerText =
            "❌ Answer: " + quotient;
    }
}

gen();
</script>

</body>
</html>
